# =============================================================================
# HADDOCK3 Configuration: ERY2-4 / CTLA-4 Docking
# =============================================================================
# Reference : Ramanayake et al. ACS Chem. Biol. 2020, 15, 360-368
# PDB       : 1I8L (Human B7-1/CTLA-4 complex)
# Receptor  : CTLA-4 (chain C)
# Ligand    : ERY2-4 HLH peptide (chain B)
# Key info  : ERY2-4 competes with B7-1, KD = 196.8 nM
# =============================================================================

run_dir = "data/output/04_docking/ery2-4_ctla4_run"

molecules = [
    "data/output/01_receptor/ctla4_final.pdb",
    "data/output/02_peptide/ery2-4_final.pdb"
]

# ── Execution settings ────────────────────────────────────────────────────────
ncores = 4          # Adjust to your system
mode = "local"      # Options: local, batch, mpi

# ── Stage 1: Topology generation ─────────────────────────────────────────────
[topoaa]
autohis = true      # Auto-assign His protonation
delenph = true      # Remove nonpolar H

# ── Stage 2: Rigid body docking ───────────────────────────────────────────────
[rigidbody]
# Restraint files
ambig_fname   = "data/output/03_restraints/air_restraints.tbl"
unambig_fname = "data/output/03_restraints/ssbond_restraints.tbl"

# Sampling - generate 1000 initial models
sampling = 1000

# Energy parameters
w_vdw   = 0.01     # Van der Waals weight (rigid body)
w_elec  = 0.0      # Electrostatics weight (rigid body)
w_air   = 0.1      # AIR restraint weight
w_bsa   = 0.0      # Buried surface area



# ── Quality assessment 1 ─────────────────────────────────────────────────────
[caprieval]
reference_fname = "data/input/1I8L.pdb"

# ── Select top models ─────────────────────────────────────────────────────────
[seletop]
select = 200        # Pass top 200 to flexible refinement

# ── Stage 3: Semi-flexible refinement ─────────────────────────────────────────
[flexref]
ambig_fname   = "data/output/03_restraints/air_restraints.tbl"
unambig_fname = "data/output/03_restraints/ssbond_restraints.tbl"

# Flexible regions - allow ERY2-4 helices to adapt
nfle = 2

fle_sta_1 = 1       # ERY2-4 start
fle_end_1 = 40      # ERY2-4 end
fle_seg_1 = "B"     # ERY2-4 peptide chain

# Semi-rigid CTLA-4 - allow MYPPPY loop flexibility
fle_sta_2 = 95      # Near MYPPPY motif
fle_end_2 = 105     # After MYPPPY motif
fle_seg_2 = "C"     # CTLA-4 receptor chain

# Energy weights (flexible refinement)
w_vdw   = 1.0
w_elec  = 1.0
w_air   = 10.0
w_bsa   = 0.0

sampling_factor = 200

# ── Quality assessment 2 ─────────────────────────────────────────────────────
[caprieval]
reference_fname = "data/input/1I8L.pdb"

# ── Select top models ─────────────────────────────────────────────────────────
[seletop]
select = 50

# ── Stage 4: Explicit water refinement ───────────────────────────────────────
[mdref]
ambig_fname   = "data/output/03_restraints/air_restraints.tbl"
unambig_fname = "data/output/03_restraints/ssbond_restraints.tbl"

# Water parameters
watersteps   = 100
waterradius  = 9.0
keepwater    = false

# Final energy weights
w_vdw  = 1.0
w_elec = 0.2
w_air  = 10.0

# ── Quality assessment 3 (final) ──────────────────────────────────────────────
[caprieval]
reference_fname = "data/input/1I8L.pdb"

# ── Clustering by FCC ─────────────────────────────────────────────────────────
[clustfcc]
threshold      = 0.75   # FCC similarity threshold
min_population = 4      # Minimum cluster size

# ── Select best from each cluster ────────────────────────────────────────────
[seletopclusts]
top_models = 4          # Top 4 models per cluster

# ── Final quality assessment ──────────────────────────────────────────────────
[caprieval]
reference_fname = "data/input/1I8L.pdb"

# ── Contact map analysis ──────────────────────────────────────────────────────
[contactmap]
# Generates residue contact maps for each cluster

# ── RMSD matrix ───────────────────────────────────────────────────────────────
[rmsdmatrix]
# For clustering validation
