name: ery24-docking
channels:
  - conda-forge
  - defaults
  - bioconda

dependencies:
  # Python
  - python=3.10

  # Core scientific
  - numpy>=1.21
  - scipy>=1.7
  - matplotlib>=3.4
  - pandas>=1.3

  # Bioinformatics
  - biopython>=1.79

  # Visualization
  - pymol-open-source  # or use commercial PyMOL

  # Build tools
  - pip
  - make

  # Pip packages
  - pip:
    - pdb-tools>=2.4
    - requests>=2.26
    - prodigy-prot>=2.0
    - haddock3              # from haddocking/haddock3
    - jupyter>=1.0
    - ipykernel
    - nbformat
